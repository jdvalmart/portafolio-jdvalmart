services:
  - type: web
    name: jdvalmart-backend
    runtime: docker
    repo: https://github.com/jdvalmart/jdvalmart-dev
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HF_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,https://jdvalmartdev.netlify.app
      - key: PORT
        value: "8000"
